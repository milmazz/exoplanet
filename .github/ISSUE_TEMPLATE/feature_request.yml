name: Feature request
description: Suggest a new capability or improvement for Exoplanet
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For larger changes (new filter types, parser rework, new behaviours),
        opening this issue first lets the design be discussed before any code is
        written — see [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Exoplanet doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How might it work? Sketch the config keys, API, or behavior.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
    validations:
      required: false

name: Elixir CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        elixir: ["1.17", "1.18", "1.19"]
        otp: ["27", "28"]
        # Elixir 1.17 supports OTP 25-27 only.
        exclude:
          - elixir: "1.17"
            otp: "28"

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Check for unused dependencies
        run: mix deps.unlock --check-unused

      - name: Audit Hex dependencies for retired packages
        run: mix hex.audit

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Build docs (warnings as errors)
        run: mix docs --warnings-as-errors

      - name: Run tests
        run: mix test

  lint:
    name: Lint (Credo + generated-code drift)
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-lint-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-lint-

      - name: Install dependencies
        run: mix deps.get

      - name: Run Credo
        run: mix credo --strict

      # The committed lib/exoplanet/datetime_parser.ex is generated from the
      # .ex.exs source. Regenerate it and fail if the result differs, so the
      # generated file can't silently drift from its definition. The "Generated
      # at" timestamp header changes on every run, so it is ignored via -I.
      - name: Verify generated DateTimeParser is up to date
        run: |
          mix nimble_parsec.compile lib/exoplanet/datetime_parser.ex.exs
          if ! git diff --exit-code -I '^# Generated at ' lib/exoplanet/datetime_parser.ex; then
            echo "::error::lib/exoplanet/datetime_parser.ex is out of sync with lib/exoplanet/datetime_parser.ex.exs."
            echo "Run 'mix nimble_parsec.compile lib/exoplanet/datetime_parser.ex.exs' and commit both files."
            exit 1
          fi
